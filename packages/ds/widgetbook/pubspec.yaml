name: scapia_ds_widgetbook
description: Widgetbook catalog for the Scapia design system.
version: 0.0.1
publish_to: none

resolution: workspace

environment:
  sdk: ^3.11.0
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  widgetbook: ^3.0.0
  google_fonts: ^6.0.0
  scapia_ds:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/icons/scapia-score/
    - assets/icons/staystars/
  fonts:
    - family: Lexend Deca
      fonts:
        - asset: assets/fonts/LexendDeca-Regular.ttf
          weight: 400
        - asset: assets/fonts/LexendDeca-Medium.ttf
          weight: 500
        - asset: assets/fonts/LexendDeca-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/LexendDeca-Bold.ttf
          weight: 700
