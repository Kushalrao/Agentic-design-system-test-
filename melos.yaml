name: scapia

packages:
  - packages/**
  - apps/**

scripts:
  analyze:
    run: dart analyze .
    description: Analyze the whole workspace.

  test:
    run: melos exec -- flutter test
    description: Run flutter test in all packages.

  format:
    run: dart format packages/ apps/
    description: Format all Dart files.

  format:check:
    run: dart format --set-exit-if-changed packages/ apps/
    description: Check formatting across the workspace.

  tokens:
    run: node tools/tokens/generate.js
    description: >
      Pull Figma variables → generate Dart token files in packages/tokens/lib/src/.
      Tier 2 files hold Dart references to Tier 1 constants, mirroring the Figma alias chain.
      Requires FIGMA_ACCESS_TOKEN env var or a local .mcp.json.

  widgetbook:
    run: flutter run -d chrome
    description: Launch Widgetbook component catalog in Chrome.
    packageFilters:
      scope: scapia_ds_widgetbook

  code-connect:publish:
    run: cd tools/code-connect && npm install --silent && cd ../.. && FIGMA_ACCESS_TOKEN=$FIGMA_ACCESS_TOKEN ./tools/code-connect/node_modules/.bin/figma connect publish --config figma.config.json
    description: >
      Publish Figma Code Connect snippets to Figma Dev Mode.
      Templates live in packages/ds/figma/**/*.figma.ts.
      Requires FIGMA_ACCESS_TOKEN env var.
      Run on every merge to main to keep Dev Mode in sync.

  code-connect:check:
    run: cd tools/code-connect && npm install --silent && cd ../.. && ./tools/code-connect/node_modules/.bin/figma connect check --config figma.config.json
    description: Validate Code Connect templates without publishing.
